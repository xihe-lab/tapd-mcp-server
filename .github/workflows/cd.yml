name: CD - Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch/minor/major) or specific version'
        required: false
        default: 'auto'

# Only one CD run at a time
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine version bump type
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -50)
          fi

          # Check for breaking changes
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP_TYPE="major"
          # Check for features
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          # Default to patch for fixes and other changes
          else
            BUMP_TYPE="patch"
          fi

          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Bump version (manual trigger with specific version)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'auto'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.version }} -m "chore: bump version to %s"
          git push origin main

      - name: Bump version (auto or push trigger)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'auto')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} -m "chore: bump version to %s [skip ci]"
          git push origin main

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @xihe-lab/tapd-mcp-server@$VERSION version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already published, skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Git tag
        if: steps.check.outputs.published == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Generate changelog
        if: steps.check.outputs.published == 'false'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=$(git describe --tags --abbrev=0 HEAD)
          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('v{0}', steps.current.outputs.version) }}
          generate_release_notes: false
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.commits }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ steps.check.outputs.published }}" == "false" ]; then
            echo "### ✅ Published @xihe-lab/tapd-mcp-server@$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Bump type:** ${{ steps.bump.outputs.type }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Changelog:**" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.changelog.outputs.commits }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⏭️ Skipped - Version $VERSION already published" >> $GITHUB_STEP_SUMMARY
          fi